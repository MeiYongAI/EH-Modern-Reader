<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modern Gallery Reader Options</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      color: #1d2430;
      background: #f5f7fb;
    }

    main {
      width: min(760px, calc(100vw - 32px));
      margin: 28px auto;
    }

    .header {
      margin-bottom: 16px;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 8px 0 0;
      color: #5b6678;
      font-size: 14px;
      line-height: 1.6;
    }

    .panel {
      margin-bottom: 14px;
      padding: 18px;
      background: #ffffff;
      border: 1px solid #dde3ee;
      border-radius: 8px;
    }

    .panel h2 {
      margin: 0 0 12px;
      font-size: 15px;
      letter-spacing: 0;
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      padding: 10px 0;
      border-top: 1px solid #edf1f7;
    }

    .row:first-of-type {
      border-top: none;
      padding-top: 0;
    }

    .row label {
      font-size: 14px;
      color: #2f3a4a;
      line-height: 1.5;
    }

    .muted {
      margin: 10px 0 0;
      color: #667085;
      font-size: 13px;
      line-height: 1.6;
    }

    input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #0b7285;
      flex: 0 0 auto;
    }

    a {
      color: #0b7285;
      font-weight: 700;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    footer {
      margin-top: 18px;
      color: #667085;
      font-size: 12px;
      text-align: center;
    }

    @media (max-width: 560px) {
      main {
        margin: 18px auto;
      }

      .row {
        align-items: flex-start;
        gap: 12px;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="header">
      <h1 data-i18n="optionsTitle">Modern Gallery Reader Options</h1>
      <p class="subtitle"><span data-i18n="currentVersion">Current version:</span> <span id="ver">-</span></p>
    </div>

    <section class="panel">
      <h2 data-i18n="features">Core Features</h2>
      <div class="row">
        <label for="opt-thumb-fallback" data-i18n="thumbnailFallback">Thumbnails: fallback to gallery thumbnails</label>
        <input id="opt-thumb-fallback" type="checkbox" checked disabled>
      </div>
      <div class="row">
        <label for="opt-nl-fallback" data-i18n="nlFallback">Image failures: nl-token mirror fallback</label>
        <input id="opt-nl-fallback" type="checkbox" checked disabled>
      </div>
      <div class="row">
        <label for="opt-key-f" data-i18n="keyF">Keyboard: F toggles thumbnail bar</label>
        <input id="opt-key-f" type="checkbox" checked disabled>
      </div>
      <p class="muted" data-i18n="builtinStrategies">These strategies are built in and are not configurable yet.</p>
    </section>

    <section class="panel">
      <h2 data-i18n="debugMode">Debug mode (console logs)</h2>
      <div class="row">
        <label for="opt-debug-mode" data-i18n="debugModeTip">When enabled, detailed logs are printed to the console and may affect performance. Turn it on only while debugging.</label>
        <input id="opt-debug-mode" type="checkbox">
      </div>
    </section>

    <section class="panel">
      <h2 data-i18n="docsLinks">Documentation:</h2>
      <p class="muted">
        <a href="welcome.html" target="_blank" rel="noopener">Welcome</a>
        ·
        <a href="README.md" target="_blank" rel="noopener">README</a>
      </p>
    </section>

    <footer data-i18n="feedbackTip">Include console logs when reporting issues</footer>
  </main>

  <script src="i18n.js"></script>
  <script src="options.js"></script>
</body>
</html>
